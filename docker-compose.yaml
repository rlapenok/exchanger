services:
  postgres:
    image: postgres:17-alpine
    container_name: exchanger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: exchanger
      POSTGRES_USER: exchanger
      POSTGRES_PASSWORD: exchanger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchanger -d exchanger"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: exchanger-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "exchanger"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "exchanger", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: exchanger-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@exchanger.dev
      PGADMIN_DEFAULT_PASSWORD: exchanger
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: exchanger-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exchanger-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: exchanger
      DB_PASSWORD: exchanger
      DB_NAME: exchanger
      DB_SCHEMA: public
      DB_SSL_MODE: disable
      DB_CONNECTION_TIMEOUT: 5
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: exchanger
      REDIS_DB: "0"
      LOGGER_LEVEL: info
      LOGGER_FORMAT: json
      LOGGER_OUTPUT: stdout
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  redisinsight_data:
